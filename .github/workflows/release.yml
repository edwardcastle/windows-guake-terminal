name: Release

# Build the Windows installer and publish it to a single GitHub Release when a
# version tag like v0.1.4 is pushed. electron-builder only *builds* here
# (--publish never); a dedicated action uploads every artifact to one release,
# avoiding electron-builder's duplicate-release race with the GitHub provider.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build the installer
        run: npx electron-builder --win --publish never
      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
